            <button id="sortLH">Low to High</button>
            <br />

          <div class="otherCategories">
            <h5>Brand</h5>
            <section>
              <input type="checkbox" placeholder="Redmi" />

            <section>
              <input type="checkbox" placeholder="Motorola" />

            <section>

            <section>

            <section>

            </section>
            <section>
              <input type="checkbox" placeholder="iQOO" />

            </section>

          <div class="otherCategories">
            <h5>Deals & Discounts</h5>
            <section>
              <input type="checkbox" placeholder="All Discounts" />

            </section>
            <section>
              <input type="checkbox" placeholder="Today's Discounts" />

            <h5>Item Condition</h5>
            <section>
              <input type="checkbox" placeholder="New" />
              <label for="New">New</label>
            </section>
            <section>
              <input type="checkbox" placeholder="Used" />
              <label for="Used">Used</label>
            </section>
          </div>

          <div class="otherCategories">
            <h5>Select Brands</h5>
            <section>
              <input type="checkbox" placeholder="Top Brands" />
              <label for="Top Brands">Top Brands</label>
            </section>
            <section>
