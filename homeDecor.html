  <body>
    <nav class="navbar"></nav>

            <section>

            <section>
              <input type="checkbox" placeholder="Webelkart" />

            </section>
            <section>

            </section>
            <section>
              <input type="checkbox" placeholder="DreamKraft" />

            <section>
              <input type="checkbox" placeholder="All Discounts" />

            </section>
            <section>
              <input type="checkbox" placeholder="Today's Discounts" />
              <label for="Today's Discounts">Today's Discounts</label>
            </section>
          </div>

          <div class="otherCategories">
            <h5>Select Brands</h5>
            <section>
              <input type="checkbox" placeholder="Top Brands" />
